
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ink: var(--color-text-primary);
    --muted: var(--color-text-secondary);
    --faint: var(--color-text-tertiary);
    --surface: var(--color-background-primary);
    --raised: var(--color-background-secondary);
    --border: var(--color-border-tertiary);
    --border-md: var(--color-border-secondary);
    --accent: #1D9E75;
    --accent-light: #E1F5EE;
    --accent-dark: #085041;
    --mono: 'DM Mono', monospace;
    --sans: 'DM Sans', var(--font-sans);
  }

  body { font-family: var(--sans); }

  .app { padding: 1.5rem 0 2rem; max-width: 660px; }

  .header { margin-bottom: 1.5rem; }
  .header h1 { font-size: 18px; font-weight: 500; color: var(--ink); letter-spacing: -0.3px; }
  .header p { font-size: 13px; color: var(--muted); margin-top: 4px; }

  .drop-zone {
    border: 1.5px dashed var(--border-md);
    border-radius: var(--border-radius-lg);
    padding: 2.5rem 1.5rem;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
    background: var(--surface);
    position: relative;
  }
  .drop-zone:hover, .drop-zone.drag-over {
    border-color: var(--accent);
    background: var(--accent-light);
  }
  .drop-zone input[type="file"] {
    position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
  }
  .drop-icon { font-size: 28px; color: var(--accent); margin-bottom: 8px; }
  .drop-zone h2 { font-size: 14px; font-weight: 500; color: var(--ink); margin-bottom: 4px; }
  .drop-zone p { font-size: 12px; color: var(--muted); }

  .controls {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 10px;
    margin: 1rem 0;
  }

  .control-box {
    background: var(--raised);
    border-radius: var(--border-radius-md);
    padding: 10px 12px;
  }
  .control-box label { display: block; font-size: 11px; color: var(--muted); font-family: var(--mono); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
  .control-box select, .control-box input[type="number"] {
    width: 100%; font-size: 13px; font-weight: 500; padding: 5px 8px; border-radius: 6px;
    border: 0.5px solid var(--border-md); background: var(--surface); color: var(--ink);
    font-family: var(--sans);
  }

  .images-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
    gap: 8px;
    margin: 1rem 0;
  }

  .img-thumb {
    position: relative;
    aspect-ratio: 1;
    border-radius: var(--border-radius-md);
    overflow: hidden;
    border: 0.5px solid var(--border);
    background: var(--raised);
    cursor: grab;
  }
  .img-thumb.dragging { opacity: 0.4; }
  .img-thumb.drag-target { outline: 2px solid var(--accent); }

  .img-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }

  .img-thumb .remove-btn {
    position: absolute; top: 4px; right: 4px;
    width: 20px; height: 20px;
    background: rgba(0,0,0,0.55); border: none; border-radius: 50%;
    color: #fff; font-size: 12px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    opacity: 0; transition: opacity 0.12s;
  }
  .img-thumb:hover .remove-btn { opacity: 1; }

  .img-thumb .seq {
    position: absolute; bottom: 4px; left: 5px;
    font-size: 10px; font-family: var(--mono);
    color: #fff;
    background: rgba(0,0,0,0.45);
    border-radius: 3px; padding: 1px 4px;
    line-height: 1.4;
  }

  .status-bar {
    display: flex; align-items: center; justify-content: space-between;
    font-size: 12px; color: var(--muted); margin-bottom: 10px;
    font-family: var(--mono);
  }

  .actions { display: flex; gap: 8px; }

  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 8px 16px; border-radius: var(--border-radius-md);
    font-size: 13px; font-weight: 500; cursor: pointer; border: 0.5px solid var(--border-md);
    background: var(--surface); color: var(--ink); font-family: var(--sans);
    transition: background 0.12s, transform 0.08s;
  }
  .btn:hover { background: var(--raised); }
  .btn:active { transform: scale(0.97); }
  .btn.primary {
    background: var(--accent); color: #fff; border-color: var(--accent-dark);
  }
  .btn.primary:hover { background: #158a64; }
  .btn.primary:disabled { background: var(--raised); color: var(--muted); border-color: var(--border); cursor: not-allowed; transform: none; }

  .progress-wrap {
    height: 3px; background: var(--raised); border-radius: 2px; overflow: hidden;
    margin: 8px 0; display: none;
  }
  .progress-bar {
    height: 100%; background: var(--accent); border-radius: 2px;
    transition: width 0.2s;
    width: 0%;
  }

  .empty-hint {
    text-align: center; padding: 2rem 0; color: var(--faint);
    font-size: 13px; display: none;
  }
</style>

<div class="app">
  <h2 class="sr-only">Image to PDF converter — upload images, set layout, download PDF</h2>

  <div class="header">
    <h1><i class="ti ti-photo-up" aria-hidden="true" style="font-size:18px;vertical-align:-2px;margin-right:6px;color:var(--accent)"></i>images → pdf</h1>
    <p>Upload images, choose how many per page, download a PDF.</p>
  </div>

  <div class="drop-zone" id="dropZone">
    <input type="file" accept="image/*" multiple id="fileInput" aria-label="Upload images">
    <div class="drop-icon"><i class="ti ti-cloud-upload" aria-hidden="true"></i></div>
    <h2>Drop images here or click to browse</h2>
    <p>JPEG, PNG, WebP, GIF — any order, drag to reorder</p>
  </div>

  <div class="controls">
    <div class="control-box">
      <label>images / page</label>
      <input type="number" id="perPage" value="2" min="1" max="12">
    </div>
    <div class="control-box">
      <label>page size</label>
      <select id="pageSize">
        <option value="a4">A4</option>
        <option value="letter">Letter</option>
        <option value="a3">A3</option>
      </select>
    </div>
    <div class="control-box">
      <label>orientation</label>
      <select id="orientation">
        <option value="portrait">Portrait</option>
        <option value="landscape">Landscape</option>
      </select>
    </div>
  </div>

  <div class="status-bar" id="statusBar" style="display:none">
    <span id="imgCount">0 images</span>
    <span id="pageCount">0 pages</span>
  </div>

  <div class="images-grid" id="imagesGrid"></div>

  <div class="empty-hint" id="emptyHint">No images yet — upload some above.</div>

  <div class="progress-wrap" id="progressWrap">
    <div class="progress-bar" id="progressBar"></div>
  </div>

  <div class="actions">
    <button class="btn" id="clearBtn" style="display:none" onclick="clearAll()">
      <i class="ti ti-trash" aria-hidden="true"></i> clear all
    </button>
    <button class="btn primary" id="generateBtn" disabled onclick="generatePDF()">
      <i class="ti ti-file-download" aria-hidden="true"></i> generate PDF
    </button>
  </div>
</div>

<script>
  const fileInput = document.getElementById('fileInput');
  const dropZone = document.getElementById('dropZone');
  const imagesGrid = document.getElementById('imagesGrid');
  const generateBtn = document.getElementById('generateBtn');
  const clearBtn = document.getElementById('clearBtn');
  const statusBar = document.getElementById('statusBar');
  const imgCountEl = document.getElementById('imgCount');
  const pageCountEl = document.getElementById('pageCount');
  const progressWrap = document.getElementById('progressWrap');
  const progressBar = document.getElementById('progressBar');
  const emptyHint = document.getElementById('emptyHint');
  const perPageInput = document.getElementById('perPage');
  const pageSizeSelect = document.getElementById('pageSize');
  const orientationSelect = document.getElementById('orientation');

  let images = [];
  let dragSrcIdx = null;

  fileInput.addEventListener('change', e => handleFiles(e.target.files));

  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault(); dropZone.classList.remove('drag-over');
    handleFiles(e.dataTransfer.files);
  });

  perPageInput.addEventListener('input', updateStatus);
  pageSizeSelect.addEventListener('change', updateStatus);
  orientationSelect.addEventListener('change', updateStatus);

  function handleFiles(files) {
    const toLoad = Array.from(files).filter(f => f.type.startsWith('image/'));
    if (!toLoad.length) return;
    let loaded = 0;
    toLoad.forEach(file => {
      const reader = new FileReader();
      reader.onload = e => {
        images.push({ src: e.target.result, name: file.name });
        loaded++;
        if (loaded === toLoad.length) renderGrid();
      };
      reader.readAsDataURL(file);
    });
  }

  function renderGrid() {
    imagesGrid.innerHTML = '';
    images.forEach((img, i) => {
      const thumb = document.createElement('div');
      thumb.className = 'img-thumb';
      thumb.draggable = true;
      thumb.dataset.idx = i;

      const imgEl = document.createElement('img');
      imgEl.src = img.src;
      imgEl.alt = img.name;

      const removeBtn = document.createElement('button');
      removeBtn.className = 'remove-btn';
      removeBtn.innerHTML = '<i class="ti ti-x" aria-hidden="true"></i>';
      removeBtn.setAttribute('aria-label', `Remove image ${i+1}`);
      removeBtn.onclick = (e) => { e.stopPropagation(); removeImage(i); };

      const seq = document.createElement('div');
      seq.className = 'seq';
      seq.textContent = i + 1;

      thumb.appendChild(imgEl);
      thumb.appendChild(removeBtn);
      thumb.appendChild(seq);

      thumb.addEventListener('dragstart', () => { dragSrcIdx = i; thumb.classList.add('dragging'); });
      thumb.addEventListener('dragend', () => { thumb.classList.remove('dragging'); clearDragTargets(); });
      thumb.addEventListener('dragover', e => { e.preventDefault(); clearDragTargets(); thumb.classList.add('drag-target'); });
      thumb.addEventListener('drop', e => { e.preventDefault(); swapImages(dragSrcIdx, i); });

      imagesGrid.appendChild(thumb);
    });

    updateStatus();
    emptyHint.style.display = images.length === 0 ? 'block' : 'none';
    statusBar.style.display = images.length > 0 ? 'flex' : 'none';
    clearBtn.style.display = images.length > 0 ? 'inline-flex' : 'none';
    generateBtn.disabled = images.length === 0;
  }

  function clearDragTargets() {
    document.querySelectorAll('.drag-target').forEach(el => el.classList.remove('drag-target'));
  }

  function swapImages(a, b) {
    if (a === null || a === b) return;
    [images[a], images[b]] = [images[b], images[a]];
    renderGrid();
  }

  function removeImage(i) {
    images.splice(i, 1);
    renderGrid();
  }

  function clearAll() {
    images = [];
    fileInput.value = '';
    renderGrid();
  }

  function updateStatus() {
    const perPage = Math.max(1, parseInt(perPageInput.value) || 1);
    const pages = images.length > 0 ? Math.ceil(images.length / perPage) : 0;
    imgCountEl.textContent = `${images.length} image${images.length !== 1 ? 's' : ''}`;
    pageCountEl.textContent = `→ ${pages} page${pages !== 1 ? 's' : ''}`;
  }

  async function generatePDF() {
    if (!images.length) return;
    const perPage = Math.max(1, Math.min(12, parseInt(perPageInput.value) || 2));
    const pageSize = pageSizeSelect.value;
    const orientation = orientationSelect.value;

    generateBtn.disabled = true;
    progressWrap.style.display = 'block';
    progressBar.style.width = '5%';

    await new Promise(r => setTimeout(r, 40));

    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ orientation, unit: 'mm', format: pageSize });

    const pageDims = doc.internal.pageSize;
    const PW = pageDims.getWidth();
    const PH = pageDims.getHeight();
    const margin = 8;
    const gap = 4;

    const cols = Math.ceil(Math.sqrt(perPage));
    const rows = Math.ceil(perPage / cols);
    const cellW = (PW - margin * 2 - gap * (cols - 1)) / cols;
    const cellH = (PH - margin * 2 - gap * (rows - 1)) / rows;

    const total = images.length;

    for (let i = 0; i < total; i++) {
      const posInPage = i % perPage;
      if (posInPage === 0 && i !== 0) doc.addPage();

      const col = posInPage % cols;
      const row = Math.floor(posInPage / cols);
      const x = margin + col * (cellW + gap);
      const y = margin + row * (cellH + gap);

      await new Promise(r => setTimeout(r, 0));

      try {
        const imgData = images[i].src;
        const fmt = imgData.startsWith('data:image/png') ? 'PNG' : 'JPEG';

        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        await new Promise(res => {
          const img = new Image();
          img.onload = () => {
            const iw = img.naturalWidth, ih = img.naturalHeight;
            const scale = Math.min(cellW * 10 / iw, cellH * 10 / ih);
            canvas.width = Math.round(iw * scale);
            canvas.height = Math.round(ih * scale);
            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
            res();
          };
          img.src = imgData;
        });

        const fitted = fitInCell(canvas.width, canvas.height, cellW, cellH);
        const cx = x + (cellW - fitted.w) / 2;
        const cy = y + (cellH - fitted.h) / 2;

        doc.addImage(canvas.toDataURL('image/jpeg', 0.92), 'JPEG', cx, cy, fitted.w, fitted.h);
      } catch(e) { console.warn('img error', e); }

      progressBar.style.width = `${Math.round(((i + 1) / total) * 90 + 5)}%`;
    }

    progressBar.style.width = '100%';
    await new Promise(r => setTimeout(r, 200));

    doc.save(`images-${Date.now()}.pdf`);

    generateBtn.disabled = false;
    progressWrap.style.display = 'none';
    progressBar.style.width = '0%';
  }

  function fitInCell(iw, ih, cw, ch) {
    const scale = Math.min(cw / iw, ch / ih);
    return { w: iw * scale, h: ih * scale };
  }
</script>

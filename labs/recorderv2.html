<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recorder</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
  background:#F5F2EE;
  font-family:'Space Mono',monospace;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:2rem 1rem;
}
.card{
  background:#fff;
  border-radius:16px;
  box-shadow:0 2px 24px rgba(0,0,0,0.07);
  padding:2.5rem 2rem;
  width:100%;
  max-width:340px;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:1.5rem;
}
.title{
  font-size:.65rem;
  letter-spacing:.3em;
  text-transform:uppercase;
  color:#aaa;
}
.btn-rec{
  width:88px;height:88px;
  border-radius:50%;
  background:#fff;
  border:2px solid #eee;
  box-shadow:0 3px 0 #ddd;
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all .1s;
}
.btn-rec:active{transform:translateY(2px);box-shadow:0 1px 0 #ddd;}
.btn-rec.on{background:#E84040;border-color:#C03030;box-shadow:0 3px 0 #a02020;}
.dot{
  width:28px;height:28px;border-radius:50%;
  background:#E84040;
  transition:all .1s;
}
.btn-rec.on .dot{background:#fff;border-radius:4px;width:20px;height:20px;}
.timer{
  font-size:2rem;letter-spacing:.08em;
  color:#222;
}
.timer.dim{color:#ccc;}
.controls{
  display:flex;gap:.75rem;width:100%;
}
.btn{
  flex:1;height:48px;
  border-radius:8px;
  border:1.5px solid #eee;
  background:#fff;
  font-family:'Space Mono',monospace;
  font-size:.65rem;letter-spacing:.1em;text-transform:uppercase;
  cursor:pointer;color:#555;
  transition:all .1s;
}
.btn:active{transform:translateY(1px);}
.btn:hover:not(:disabled){border-color:#bbb;color:#222;}
.btn:disabled{opacity:.3;cursor:default;}
.btn.play{background:#F96B2F;border-color:#E05020;color:#fff;}
.btn.play:hover:not(:disabled){background:#E05020;}
audio{width:100%;outline:none;display:none;}
audio.show{display:block;}
.divider{width:100%;height:1px;background:#f0ede8;}
.echo-title{
  font-size:.55rem;letter-spacing:.25em;text-transform:uppercase;
  color:#bbb;align-self:flex-start;
}
.knobs{display:flex;gap:0;width:100%;justify-content:space-around;}
.knob-unit{display:flex;flex-direction:column;align-items:center;gap:.35rem;}
.knob-lbl{font-size:.5rem;letter-spacing:.18em;text-transform:uppercase;color:#bbb;}
.knob-cv{cursor:ns-resize;}
.knob-val{font-size:.58rem;color:#999;min-width:36px;text-align:center;}
.status{
  font-size:.55rem;letter-spacing:.2em;text-transform:uppercase;
  color:#bbb;
  min-height:1em;
}
.status.rec{color:#E84040;}
.status.ready{color:#F96B2F;}
.credit{
  font-size:.48rem;letter-spacing:.1em;color:#ccc;text-transform:uppercase;
}
.credit a{color:#bbb;text-decoration:none;border-bottom:1px solid #eee;}
</style>
</head>
<body>
<div class="card">
  <span class="title">Recorder</span>

  <button class="btn-rec" id="btnRec" onclick="toggleRec()">
    <div class="dot"></div>
  </button>

  <div class="timer dim" id="timer">00:00</div>

  <span class="status" id="status">tap to record</span>

  <div class="controls">
    <button class="btn play" id="btnPlay" disabled>▶ play</button>
    <button class="btn" id="btnSave" onclick="saveRec()" disabled>↓ save</button>
    <button class="btn" id="btnClear" onclick="clearRec()" disabled>✕</button>
  </div>

  <audio id="player" controls class=""></audio>

  <div class="divider"></div>
  <span class="echo-title">echo fx — playback only</span>
  <div class="knobs">
    <div class="knob-unit">
      <span class="knob-lbl">delay</span>
      <canvas class="knob-cv" id="kn-delay" width="68" height="68"></canvas>
      <span class="knob-val" id="kv-delay">320ms</span>
    </div>
    <div class="knob-unit">
      <span class="knob-lbl">feedback</span>
      <canvas class="knob-cv" id="kn-feedback" width="68" height="68"></canvas>
      <span class="knob-val" id="kv-feedback">15%</span>
    </div>
    <div class="knob-unit">
      <span class="knob-lbl">mix</span>
      <canvas class="knob-cv" id="kn-mix" width="68" height="68"></canvas>
      <span class="knob-val" id="kv-mix">15%</span>
    </div>
  </div>

  <span class="credit">crafted with ♥ by <a href="mailto:mv.jayadev@gmail.com">Jayadev</a> · v20260515-1555</span>
</div>

<script>
let stream=null,recorder=null,chunks=[],blob=null;
let recording=false,secs=0,tick=null;

async function init(){
  if(stream)return true;
  try{
    stream=await navigator.mediaDevices.getUserMedia({
      audio:{
        echoCancellation:false,
        noiseSuppression:false,
        autoGainControl:false,
        channelCount:1,
      },
      video:false
    });
    return true;
  }catch(e){
    setStatus('mic denied','');
    return false;
  }
}

async function toggleRec(){
  if(!recording){
    if(!await init())return;
    startRec();
  } else {
    stopRec();
  }
}

function bestMime(){
  const types=[
    'audio/webm;codecs=opus',
    'audio/webm',
    'audio/ogg;codecs=opus',
    'audio/mp4',
  ];
  for(const t of types) if(MediaRecorder.isTypeSupported(t)) return t;
  return '';
}

function startRec(){
  chunks=[];recording=true;secs=0;
  const mime=bestMime();
  recorder=new MediaRecorder(stream,{
    ...(mime?{mimeType:mime}:{}),
    audioBitsPerSecond:256000,  // 256kbps — near-lossless for voice
  });
  recorder.ondataavailable=e=>{ if(e.data.size>0)chunks.push(e.data); };
  recorder.onstop=onStop;
  recorder.start();
  document.getElementById('btnRec').classList.add('on');
  document.getElementById('timer').classList.remove('dim');
  setStatus('recording','rec');
  tick=setInterval(()=>{
    secs++;
    const m=String(Math.floor(secs/60)).padStart(2,'0');
    const s=String(secs%60).padStart(2,'0');
    document.getElementById('timer').textContent=m+':'+s;
  },1000);
}

function stopRec(){
  recording=false;
  recorder.stop();
  clearInterval(tick);
  document.getElementById('btnRec').classList.remove('on');
  setStatus('processing…','');
}

function onStop(){
  blob=new Blob(chunks,{type:chunks[0]?.type||'audio/webm'});
  const url=URL.createObjectURL(blob);
  const player=document.getElementById('player');
  player.src=url;
  player.classList.add('show');
  setStatus('ready','ready');
  document.getElementById('btnPlay').disabled=false;
  document.getElementById('btnSave').disabled=false;
  document.getElementById('btnClear').disabled=false;
}

function playRec(){
  const p=document.getElementById('player');
  if(p.paused){p.play();document.getElementById('btnPlay').textContent='■ stop';}
  else{p.pause();p.currentTime=0;document.getElementById('btnPlay').textContent='▶ play';}
}

function saveRec(){
  if(!blob)return;
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='recording.webm';
  a.click();
}

function clearRec(){
  blob=null;chunks=[];secs=0;recording=false;
  const player=document.getElementById('player');
  player.src='';player.classList.remove('show');
  document.getElementById('timer').textContent='00:00';
  document.getElementById('timer').classList.add('dim');
  document.getElementById('btnPlay').disabled=true;
  document.getElementById('btnPlay').textContent='▶ play';
  document.getElementById('btnSave').disabled=true;
  document.getElementById('btnClear').disabled=true;
  setStatus('tap to record','');
}

function setStatus(txt,cls){
  const el=document.getElementById('status');
  el.textContent=txt;
  el.className='status'+(cls?' '+cls:'');
}

document.getElementById('player').onended=()=>{
  document.getElementById('btnPlay').textContent='▶ play';
};

// ── Echo — AudioContext only exists during playback ──
let AC=null,delay=null,fbGain=null,wetG=null,dryG=null,masterG=null;

const KN={
  delay:    {v:.32, min:.05, max:1.2, unit:'ms', m:1000, dp:0},
  feedback: {v:.15, min:0,   max:.85, unit:'%',  m:100,  dp:0},
  mix:      {v:.15, min:0,   max:1,   unit:'%',  m:100,  dp:0}
};

function initAC(){
  if(AC)return;
  AC=new(window.AudioContext||window.webkitAudioContext)();
  delay=AC.createDelay(2);       delay.delayTime.value=KN.delay.v;
  fbGain=AC.createGain();        fbGain.gain.value=KN.feedback.v;
  wetG=AC.createGain();          wetG.gain.value=KN.mix.v;
  dryG=AC.createGain();          dryG.gain.value=1-KN.mix.v*0.5;
  masterG=AC.createGain();       masterG.gain.value=0.9;
  delay.connect(fbGain); fbGain.connect(delay);
  delay.connect(wetG);   wetG.connect(masterG);
  dryG.connect(masterG); masterG.connect(AC.destination);
}

// Override playRec to route through echo chain
function playRec(){
  if(!blob)return;
  const player=document.getElementById('player');
  // If native player is playing, stop it
  if(!player.paused){
    player.pause();player.currentTime=0;
    document.getElementById('btnPlay').textContent='▶ play';
    return;
  }
  initAC();
  if(AC.state==='suspended')AC.resume();
  blob.arrayBuffer().then(buf=>AC.decodeAudioData(buf)).then(audioBuf=>{
    const src=AC.createBufferSource();
    src.buffer=audioBuf;
    src.connect(dryG);
    src.connect(delay);
    src.start();
    document.getElementById('btnPlay').textContent='■ stop';
    src.onended=()=>{ document.getElementById('btnPlay').textContent='▶ play'; };
    // store so stop works
    player._acSrc=src;
  });
}

// Patch stop into btn
document.getElementById('btnPlay').onclick=function(){
  if(!blob)return;
  const player=document.getElementById('player');
  if(player._acSrc){
    try{player._acSrc.stop();}catch(e){}
    player._acSrc=null;
    this.textContent='▶ play';
    return;
  }
  playRec();
};

// Knob drawing + interaction
function drawKnob(id,v,min,max){
  const cv=document.getElementById('kn-'+id);if(!cv)return;
  const ctx=cv.getContext('2d'),W=cv.width,H=cv.height,cx=W/2,cy=H/2,R=24;
  ctx.clearRect(0,0,W,H);
  const sa=Math.PI*.75,ea=Math.PI*2.25,angle=sa+(v-min)/(max-min)*(ea-sa);
  ctx.beginPath();ctx.arc(cx,cy,R,sa,ea);
  ctx.strokeStyle='#eee';ctx.lineWidth=4;ctx.lineCap='round';ctx.stroke();
  ctx.beginPath();ctx.arc(cx,cy,R,sa,angle);
  ctx.strokeStyle='#F96B2F';ctx.lineWidth=4;ctx.lineCap='round';ctx.stroke();
  // body
  const g=ctx.createRadialGradient(cx-2,cy-3,3,cx,cy,R-6);
  g.addColorStop(0,'#fafafa');g.addColorStop(1,'#e8e5e0');
  ctx.beginPath();ctx.arc(cx,cy,R-6,0,Math.PI*2);ctx.fillStyle=g;ctx.fill();
  ctx.beginPath();ctx.arc(cx,cy,R-6,0,Math.PI*2);
  ctx.strokeStyle='rgba(0,0,0,0.08)';ctx.lineWidth=1;ctx.stroke();
  // dot
  const nx=cx+Math.cos(angle)*(R-12),ny=cy+Math.sin(angle)*(R-12);
  ctx.beginPath();ctx.arc(nx,ny,2.5,0,Math.PI*2);ctx.fillStyle='#333';ctx.fill();
}

function updateKnob(id){
  const k=KN[id];
  document.getElementById('kv-'+id).textContent=(k.v*k.m).toFixed(k.dp)+k.unit;
  drawKnob(id,k.v,k.min,k.max);
  if(!AC)return;
  if(id==='delay')delay.delayTime.value=k.v;
  if(id==='feedback')fbGain.gain.value=k.v;
  if(id==='mix'){wetG.gain.value=k.v;dryG.gain.value=1-k.v*0.5;}
}

function setupKnob(id){
  const cv=document.getElementById('kn-'+id),k=KN[id];
  let drag=false,sy=0,sv=0;
  cv.addEventListener('mousedown',e=>{drag=true;sy=e.clientY;sv=k.v;e.preventDefault();});
  window.addEventListener('mousemove',e=>{if(!drag)return;k.v=Math.max(k.min,Math.min(k.max,sv+(sy-e.clientY)/100*(k.max-k.min)));updateKnob(id);});
  window.addEventListener('mouseup',()=>drag=false);
  cv.addEventListener('wheel',e=>{e.preventDefault();k.v=Math.max(k.min,Math.min(k.max,k.v-e.deltaY/400*(k.max-k.min)));updateKnob(id);},{passive:false});
  cv.addEventListener('touchstart',e=>{drag=true;sy=e.touches[0].clientY;sv=k.v;e.preventDefault();},{passive:false});
  window.addEventListener('touchmove',e=>{if(!drag)return;k.v=Math.max(k.min,Math.min(k.max,sv+(sy-e.touches[0].clientY)/100*(k.max-k.min)));updateKnob(id);});
  window.addEventListener('touchend',()=>drag=false);
  updateKnob(id);
}

window.addEventListener('DOMContentLoaded',()=>{
  setupKnob('delay');setupKnob('feedback');setupKnob('mix');
});
</script>
</body>
</html>

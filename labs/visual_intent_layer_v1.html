<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VIL — Visual Intent Layer</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mediapipe/0.10.3/camera_utils.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #090909;
    --surface: #111111;
    --border: #1e1e1e;
    --accent: #00ff88;
    --accent2: #ff3c6f;
    --text: #e8e8e8;
    --muted: #555;
    --glow: 0 0 20px rgba(0,255,136,0.3);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  header {
    padding: 14px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .logo {
    font-family: 'Bebas Neue', cursive;
    font-size: 28px;
    letter-spacing: 4px;
    color: var(--accent);
    text-shadow: var(--glow);
  }
  .logo span { color: var(--muted); font-size: 13px; font-family: 'Space Mono', monospace; letter-spacing: 1px; display: block; margin-top: -4px; }
  .status-pill {
    font-size: 11px;
    padding: 4px 12px;
    border-radius: 20px;
    border: 1px solid var(--accent);
    color: var(--accent);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); animation: pulse 1.5s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  .main {
    display: grid;
    grid-template-columns: 1fr 380px;
    flex: 1;
    overflow: hidden;
    height: calc(100vh - 57px);
  }

  /* LEFT — Camera */
  .camera-panel {
    position: relative;
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: #050505;
    overflow: hidden;
  }
  #videoEl {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transform: scaleX(-1);
    opacity: 0.85;
  }
  #canvasEl {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    transform: scaleX(-1);
  }
  .camera-overlay {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none;
  }
  .corner { position: absolute; width: 20px; height: 20px; border-color: var(--accent); border-style: solid; opacity: 0.7; }
  .corner.tl { top:16px; left:16px; border-width: 2px 0 0 2px; }
  .corner.tr { top:16px; right:16px; border-width: 2px 2px 0 0; }
  .corner.bl { bottom:16px; left:16px; border-width: 0 0 2px 2px; }
  .corner.br { bottom:16px; right:16px; border-width: 0 2px 2px 0; }

  .gesture-badge {
    position: absolute;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.8);
    border: 1px solid var(--accent);
    border-radius: 4px;
    padding: 8px 20px;
    font-size: 13px;
    color: var(--accent);
    letter-spacing: 2px;
    text-transform: uppercase;
    backdrop-filter: blur(8px);
    transition: all 0.2s;
    min-width: 160px;
    text-align: center;
  }
  .gesture-badge.active { box-shadow: var(--glow); }

  .no-camera {
    position: absolute;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    color: var(--muted);
    font-size: 13px;
  }
  .no-camera-icon { font-size: 40px; opacity: 0.3; }

  /* RIGHT — Conversation + Gesture Map */
  .right-panel {
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .gesture-map {
    border-bottom: 1px solid var(--border);
    padding: 14px 16px;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 6px;
  }
  .gesture-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 8px 6px;
    text-align: center;
    transition: all 0.15s;
    cursor: default;
  }
  .gesture-item.lit {
    border-color: var(--accent);
    background: rgba(0,255,136,0.08);
    box-shadow: var(--glow);
  }
  .gesture-item .emoji { font-size: 18px; display: block; }
  .gesture-item .label { font-size: 9px; color: var(--muted); margin-top: 3px; letter-spacing: 1px; text-transform: uppercase; }
  .gesture-item.lit .label { color: var(--accent); }

  .conversation {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  .msg {
    max-width: 90%;
    animation: fadeUp 0.3s ease;
  }
  @keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
  .msg.gesture { align-self: flex-end; }
  .msg.response { align-self: flex-start; }

  .msg-bubble {
    padding: 10px 14px;
    border-radius: 4px;
    font-size: 12px;
    line-height: 1.6;
  }
  .msg.gesture .msg-bubble {
    background: rgba(0,255,136,0.1);
    border: 1px solid rgba(0,255,136,0.3);
    color: var(--accent);
  }
  .msg.response .msg-bubble {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
  }
  .msg-label {
    font-size: 9px;
    color: var(--muted);
    letter-spacing: 1px;
    margin-bottom: 4px;
    text-transform: uppercase;
  }
  .msg.gesture .msg-label { text-align: right; }

  .thinking {
    align-self: flex-start;
    display: flex;
    gap: 4px;
    align-items: center;
    padding: 10px 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
  }
  .thinking span {
    width: 5px; height: 5px; border-radius: 50%;
    background: var(--muted);
    animation: blink 1.2s infinite;
  }
  .thinking span:nth-child(2) { animation-delay: 0.2s; }
  .thinking span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes blink { 0%,80%,100%{opacity:0.2} 40%{opacity:1} }

  .input-bar {
    border-top: 1px solid var(--border);
    padding: 12px 16px;
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .input-bar input {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    padding: 8px 12px;
    outline: none;
    transition: border-color 0.2s;
  }
  .input-bar input:focus { border-color: var(--accent); }
  .input-bar input::placeholder { color: var(--muted); }
  .send-btn {
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 4px;
    padding: 8px 16px;
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 1px;
    transition: opacity 0.2s;
  }
  .send-btn:hover { opacity: 0.8; }
  .send-btn:disabled { opacity: 0.3; cursor: not-allowed; }

  .start-camera-btn {
    background: transparent;
    border: 1px solid var(--accent);
    color: var(--accent);
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    padding: 10px 20px;
    cursor: pointer;
    letter-spacing: 2px;
    text-transform: uppercase;
    border-radius: 4px;
    margin-top: 12px;
    transition: all 0.2s;
  }
  .start-camera-btn:hover { background: rgba(0,255,136,0.1); }
</style>
</head>
<body>

<header>
  <div>
    <div class="logo">VIL <span>Visual Intent Layer · v0.1</span></div>
  </div>
  <div class="status-pill"><div class="dot"></div> <span id="statusText">READY</span></div>
</header>

<div class="main">

  <!-- CAMERA PANEL -->
  <div class="camera-panel" id="cameraPanel">
    <div class="no-camera" id="noCameraMsg">
      <div class="no-camera-icon">📷</div>
      <div>Camera not active</div>
      <button class="start-camera-btn" onclick="startCamera()">START CAMERA</button>
    </div>
    <video id="videoEl" autoplay playsinline style="display:none"></video>
    <canvas id="canvasEl" style="display:none"></canvas>
    <div class="camera-overlay">
      <div class="corner tl"></div>
      <div class="corner tr"></div>
      <div class="corner bl"></div>
      <div class="corner br"></div>
    </div>
    <div class="gesture-badge" id="gestureBadge">— NO HAND —</div>
  </div>

  <!-- RIGHT PANEL -->
  <div class="right-panel">

    <!-- GESTURE MAP -->
    <div class="gesture-map" id="gestureMap">
      <div class="gesture-item" id="g-thumbsup"><span class="emoji">👍</span><div class="label">Yes / Good</div></div>
      <div class="gesture-item" id="g-thumbsdown"><span class="emoji">👎</span><div class="label">No / Stop</div></div>
      <div class="gesture-item" id="g-point"><span class="emoji">☝️</span><div class="label">Focus</div></div>
      <div class="gesture-item" id="g-peace"><span class="emoji">✌️</span><div class="label">Options</div></div>
      <div class="gesture-item" id="g-open"><span class="emoji">🖐️</span><div class="label">Pause</div></div>
      <div class="gesture-item" id="g-fist"><span class="emoji">✊</span><div class="label">Confirm</div></div>
      <div class="gesture-item" id="g-ok"><span class="emoji">👌</span><div class="label">Perfect</div></div>
      <div class="gesture-item" id="g-call"><span class="emoji">🤙</span><div class="label">Explain</div></div>
    </div>

    <!-- CONVERSATION -->
    <div class="conversation" id="conversation">
      <div class="msg response">
        <div class="msg-label">VIL SYSTEM</div>
        <div class="msg-bubble">Visual Intent Layer active. Show a hand gesture to the camera — I will interpret your intent and respond. Or type below.</div>
      </div>
    </div>

    <!-- INPUT BAR -->
    <div class="input-bar">
      <input type="text" id="textInput" placeholder="or type context / question..." />
      <button class="send-btn" id="sendBtn" onclick="sendText()">SEND</button>
    </div>
  </div>
</div>

<script>
// ── State ──────────────────────────────────────────────────────────────
let currentGesture = null;
let gestureHoldTimer = null;
let lastSentGesture = null;
let isProcessing = false;
let conversationHistory = [];
let cameraStarted = false;
let gestureHoldMs = 1800;

// ── Gesture Detection ──────────────────────────────────────────────────
function detectGesture(landmarks) {
  const tip = (i) => landmarks[i];
  const pip = (i) => landmarks[i - 2];

  // Extended finger check (tip higher than pip = extended)
  const isExtended = (tipIdx) => tip(tipIdx).y < pip(tipIdx).y;

  const thumb = landmarks[4].x < landmarks[3].x; // rough thumb right
  const index = isExtended(8);
  const middle = isExtended(12);
  const ring = isExtended(16);
  const pinky = isExtended(20);

  // Thumb direction
  const thumbUp = landmarks[4].y < landmarks[3].y && landmarks[4].y < landmarks[9].y;
  const thumbDown = landmarks[4].y > landmarks[3].y && landmarks[4].y > landmarks[9].y;

  // Open palm
  if (index && middle && ring && pinky) return 'open';

  // Fist
  if (!index && !middle && !ring && !pinky) {
    if (!thumbUp && !thumbDown) return 'fist';
    if (thumbUp) return 'thumbsup';
    if (thumbDown) return 'thumbsdown';
    return 'fist';
  }

  // Peace ✌️
  if (index && middle && !ring && !pinky) return 'peace';

  // Point ☝️
  if (index && !middle && !ring && !pinky) return 'point';

  // OK 👌 — thumb and index close, others extended
  const thumbTip = landmarks[4];
  const indexTip = landmarks[8];
  const dist = Math.hypot(thumbTip.x - indexTip.x, thumbTip.y - indexTip.y);
  if (dist < 0.07 && middle && ring) return 'ok';

  // Call 🤙
  if (!index && !middle && !ring && pinky && thumbUp) return 'call';

  return null;
}

const gestureMap = {
  thumbsup: { id: 'g-thumbsup', emoji: '👍', label: 'YES / GOOD', prompt: 'User gestured THUMBS UP — signaling agreement, approval, or "yes". Generate a warm, confirming, encouraging response in 2-3 sentences.' },
  thumbsdown: { id: 'g-thumbsdown', emoji: '👎', label: 'NO / STOP', prompt: 'User gestured THUMBS DOWN — signaling disagreement or "no". Respond acknowledging the refusal, offer an alternative direction.' },
  point: { id: 'g-point', emoji: '☝️', label: 'FOCUS', prompt: 'User pointed their index finger — signaling "focus on this" or "one important thing". Respond with a sharp, single focused insight or question.' },
  peace: { id: 'g-peace', emoji: '✌️', label: 'OPTIONS', prompt: 'User showed a peace/two-finger gesture — signaling "give me two options or alternatives". Present exactly two distinct choices or paths.' },
  open: { id: 'g-open', emoji: '🖐️', label: 'PAUSE', prompt: 'User showed open palm — signaling "pause" or "hold on". Respond with a grounding, reflective statement about the current direction.' },
  fist: { id: 'g-fist', emoji: '✊', label: 'CONFIRM', prompt: 'User showed a fist — signaling strength, confirmation, or "lets do this". Respond with a bold, action-oriented statement.' },
  ok: { id: 'g-ok', emoji: '👌', label: 'PERFECT', prompt: 'User showed OK gesture — signaling "perfect, exactly right". Respond affirming the current direction is excellent, with a brief next step.' },
  call: { id: 'g-call', emoji: '🤙', label: 'EXPLAIN', prompt: 'User showed call/shaka gesture — signaling "explain more" or "talk to me". Respond with an engaging, accessible explanation of the topic at hand.' },
};

// ── MediaPipe Hands ────────────────────────────────────────────────────
let hands;
let camera;

function initMediaPipe() {
  // Use a simple approach: load the scripts then init
  const script1 = document.createElement('script');
  script1.src = 'https://cdnjs.cloudflare.com/ajax/libs/mediapipe/0.10.3/hands.js';
  script1.onload = () => setupHands();
  document.head.appendChild(script1);
}

function setupHands() {
  if (typeof Hands === 'undefined') {
    useFallbackMode();
    return;
  }

  hands = new Hands({ locateFile: (f) => `https://cdnjs.cloudflare.com/ajax/libs/mediapipe/0.10.3/${f}` });
  hands.setOptions({ maxNumHands: 1, modelComplexity: 0, minDetectionConfidence: 0.7, minTrackingConfidence: 0.5 });
  hands.onResults(onHandResults);

  const video = document.getElementById('videoEl');
  const canvas = document.getElementById('canvasEl');
  const ctx = canvas.getContext('2d');

  navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } }).then(stream => {
    video.srcObject = stream;
    video.style.display = 'block';
    canvas.style.display = 'block';
    document.getElementById('noCameraMsg').style.display = 'none';
    document.getElementById('statusText').textContent = 'TRACKING';

    video.onloadedmetadata = () => {
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      processFrame(video, canvas, ctx);
    };
  }).catch(() => useFallbackMode());
}

function processFrame(video, canvas, ctx) {
  if (!hands) return;
  ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
  hands.send({ image: canvas }).then(() => requestAnimationFrame(() => processFrame(video, canvas, ctx)));
}

function onHandResults(results) {
  if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
    const landmarks = results.multiHandLandmarks[0];
    const gesture = detectGesture(landmarks);
    updateGestureState(gesture);
  } else {
    updateGestureState(null);
  }
}

function useFallbackMode() {
  document.getElementById('statusText').textContent = 'MANUAL MODE';
  document.getElementById('noCameraMsg').innerHTML = `
    <div class="no-camera-icon">🤚</div>
    <div style="font-size:11px;text-align:center;line-height:1.8;color:#666">Camera/MediaPipe unavailable.<br>Use gesture buttons below or type.</div>
  `;
  // Add clickable gesture buttons
  Object.entries(gestureMap).forEach(([key, val]) => {
    const el = document.getElementById(val.id);
    if (el) {
      el.style.cursor = 'pointer';
      el.title = 'Click to trigger';
      el.onclick = () => triggerGestureManually(key);
    }
  });
}

function triggerGestureManually(gestureKey) {
  if (isProcessing) return;
  const g = gestureMap[gestureKey];
  if (!g) return;
  document.getElementById('gestureBadge').textContent = g.label;
  document.getElementById('gestureBadge').className = 'gesture-badge active';
  sendGestureToLLM(gestureKey);
}

// ── Gesture Hold Logic ─────────────────────────────────────────────────
function updateGestureState(gesture) {
  const badge = document.getElementById('gestureBadge');

  // Clear all gesture highlights
  Object.values(gestureMap).forEach(g => document.getElementById(g.id)?.classList.remove('lit'));

  if (!gesture) {
    badge.textContent = '— NO HAND —';
    badge.className = 'gesture-badge';
    clearTimeout(gestureHoldTimer);
    currentGesture = null;
    return;
  }

  const gData = gestureMap[gesture];
  if (!gData) return;

  document.getElementById(gData.id)?.classList.add('lit');
  badge.textContent = gData.label;
  badge.className = 'gesture-badge active';

  if (gesture !== currentGesture) {
    currentGesture = gesture;
    clearTimeout(gestureHoldTimer);
    if (!isProcessing) {
      gestureHoldTimer = setTimeout(() => {
        if (currentGesture === gesture) sendGestureToLLM(gesture);
      }, gestureHoldMs);
    }
  }
}

// ── LLM Communication ──────────────────────────────────────────────────
async function sendGestureToLLM(gestureKey) {
  if (isProcessing) return;
  const g = gestureMap[gestureKey];
  if (!g) return;
  if (lastSentGesture === gestureKey) {
    lastSentGesture = null;
    return;
  }
  lastSentGesture = gestureKey;

  const userMsg = `${g.emoji} [${g.label}]`;
  addMessage('gesture', userMsg);
  await callClaude(g.prompt);
}

async function sendText() {
  const input = document.getElementById('textInput');
  const text = input.value.trim();
  if (!text || isProcessing) return;
  input.value = '';
  addMessage('gesture', text);
  await callClaude(text);
}

function addMessage(type, text) {
  const conv = document.getElementById('conversation');
  const div = document.createElement('div');
  div.className = `msg ${type}`;
  const label = type === 'gesture' ? 'YOU → GESTURE' : 'VIL RESPONSE';
  div.innerHTML = `<div class="msg-label">${label}</div><div class="msg-bubble">${text}</div>`;
  conv.appendChild(div);
  conv.scrollTop = conv.scrollHeight;
}

function addThinking() {
  const conv = document.getElementById('conversation');
  const div = document.createElement('div');
  div.className = 'thinking';
  div.id = 'thinkingIndicator';
  div.innerHTML = '<span></span><span></span><span></span>';
  conv.appendChild(div);
  conv.scrollTop = conv.scrollHeight;
  return div;
}

function removeThinking() {
  document.getElementById('thinkingIndicator')?.remove();
}

async function callClaude(userPrompt) {
  isProcessing = true;
  document.getElementById('sendBtn').disabled = true;

  const thinking = addThinking();

  const systemPrompt = `You are VIL — Visual Intent Layer. You interpret hand gesture signals from a user and respond conversationally. 
The user is Jay, a senior technology leader (CTO) who is exploring a novel human-computer interaction paradigm using gestures + AI.
Keep responses brief (2-4 sentences), intelligent, and action-oriented. No filler. Be a sharp thinking partner.`;

  conversationHistory.push({ role: 'user', content: userPrompt });

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: systemPrompt,
        messages: conversationHistory,
      })
    });
    const data = await response.json();
    const reply = data.content?.find(b => b.type === 'text')?.text || 'No response.';
    conversationHistory.push({ role: 'assistant', content: reply });
    removeThinking();
    addMessage('response', reply);
  } catch (e) {
    removeThinking();
    addMessage('response', 'Error reaching Claude API. Check connection.');
  }

  isProcessing = false;
  document.getElementById('sendBtn').disabled = false;
}

// ── Init ───────────────────────────────────────────────────────────────
function startCamera() {
  if (cameraStarted) return;
  cameraStarted = true;
  initMediaPipe();
}

// Keyboard shortcut
document.getElementById('textInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') sendText();
});

// Auto-try fallback gesture clicks for demo
document.addEventListener('DOMContentLoaded', () => {
  Object.entries(gestureMap).forEach(([key, val]) => {
    const el = document.getElementById(val.id);
    if (el) {
      el.style.cursor = 'pointer';
      el.onclick = () => { if (!cameraStarted) triggerGestureManually(key); };
    }
  });
});
</script>
</body>
</html>

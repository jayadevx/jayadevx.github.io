<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Prompter</title>
<meta name="description" content="A tele-prompter for the browser. Paste your script, set the pace, present.">
<link rel="canonical" href="https://singularityblue.com/labs/prompter/">
<meta property="og:type" content="website">
<meta property="og:title" content="Prompter">
<meta property="og:description" content="A tele-prompter for the browser. Paste your script, set the pace, present.">
<meta property="og:url" content="https://singularityblue.com/labs/prompter/">
<meta name="twitter:card" content="summary">
<meta name="twitter:title" content="Prompter">
<meta name="twitter:description" content="A tele-prompter for the browser. Paste your script, set the pace, present.">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg:#07090C; --panel:#12161C; --border:#232A33;
    --text:#F2F6FA; --muted:#7D8894; --accent:#E3B341; --live:#2EBD85;
    --size:38px; --lh:1.5;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  *{scrollbar-width:thin;scrollbar-color:rgba(125,136,148,.3) transparent}
  *::-webkit-scrollbar{width:8px}
  *::-webkit-scrollbar-track{background:transparent}
  *::-webkit-scrollbar-thumb{background:rgba(125,136,148,.3);border-radius:8px}
  html,body{height:100%}
  body{background:var(--bg);color:var(--text);font-family:Inter,system-ui,sans-serif;display:flex;flex-direction:column;overflow:hidden}

  /* ---------- bar ---------- */
  .bar{display:flex;align-items:center;gap:14px;padding:8px 12px;background:var(--panel);border-bottom:1px solid var(--border);flex-wrap:wrap;flex-shrink:0}
  .name{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.14em;color:var(--muted);text-transform:uppercase;margin-right:auto;display:flex;align-items:center;gap:8px}
  .dot{width:7px;height:7px;border-radius:50%;background:var(--muted);transition:background .2s}
  body.running .dot{background:var(--live);box-shadow:0 0 8px var(--live)}
  .ctl{display:flex;align-items:center;gap:7px;font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.08em;color:var(--muted);text-transform:uppercase}
  .ctl input[type=range]{width:96px;accent-color:var(--accent)}
  .ctl input[type=checkbox]{accent-color:var(--accent);width:14px;height:14px}
  .val{color:var(--text);min-width:26px;text-align:right}
  .btn{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.08em;background:transparent;color:var(--text);border:1px solid var(--border);border-radius:7px;padding:7px 13px;cursor:pointer;transition:border-color .15s,background .15s}
  .btn:hover{border-color:var(--accent)}
  .btn.primary{background:var(--accent);color:#1a1300;border-color:var(--accent);font-weight:600}
  .btn:focus-visible,input:focus-visible,textarea:focus-visible{outline:2px solid var(--accent);outline-offset:2px}

  /* ---------- stage ---------- */
  .stage{flex:1;position:relative;overflow:hidden;min-height:0}
  .track{position:absolute;left:0;right:0;top:0;padding:0 6vw;will-change:transform}
  .script{font-size:var(--size);line-height:var(--lh);font-weight:600;letter-spacing:.005em;white-space:pre-wrap;word-break:break-word}
  body.mirror .track{transform-origin:center;scale:-1 1}

  /* eyeline guide */
  .guide{position:absolute;left:0;right:0;top:38%;height:2px;background:linear-gradient(90deg,transparent,rgba(227,179,65,.5),transparent);pointer-events:none;display:none}
  body.guides .guide{display:block}
  .guide::before,.guide::after{content:'';position:absolute;top:-4px;width:0;height:0;border-top:5px solid transparent;border-bottom:5px solid transparent}
  .guide::before{left:0;border-left:8px solid var(--accent)}
  .guide::after{right:0;border-right:8px solid var(--accent)}

  /* fades top and bottom so text arrives and leaves softly */
  .stage::before,.stage::after{content:'';position:absolute;left:0;right:0;height:14%;pointer-events:none;z-index:2}
  .stage::before{top:0;background:linear-gradient(var(--bg),transparent)}
  .stage::after{bottom:0;background:linear-gradient(transparent,var(--bg))}

  /* ---------- editor ---------- */
  .editor{position:absolute;inset:0;background:var(--bg);display:none;flex-direction:column;padding:14px;z-index:5}
  body.editing .editor{display:flex}
  .editor textarea{flex:1;background:var(--panel);color:var(--text);border:1px solid var(--border);border-radius:10px;padding:16px;font-family:Inter,sans-serif;font-size:15px;line-height:1.6;resize:none}
  .editor .erow{display:flex;gap:10px;margin-top:10px;align-items:center}
  .hint{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--muted);margin-right:auto;letter-spacing:.05em}

  /* ---------- countdown ---------- */
  .count{position:absolute;inset:0;display:none;align-items:center;justify-content:center;background:rgba(7,9,12,.88);z-index:6;font-family:'IBM Plex Mono',monospace;font-size:120px;font-weight:500;color:var(--accent)}
  body.counting .count{display:flex}

  @media (max-width:820px){ .name{width:100%;margin-bottom:2px} }
  @media (prefers-reduced-motion:reduce){ *{transition:none!important} }
</style>
</head>
<body class="guides">

  <div class="bar" id="bar">
    <div class="name"><span class="dot"></span>Prompter</div>

    <label class="ctl">Speed <input type="range" id="speed" min="10" max="200" step="5" value="60" /><span class="val" id="speedv">60</span></label>
    <label class="ctl">Size <input type="range" id="size" min="18" max="80" step="2" value="38" /><span class="val" id="sizev">38</span></label>
    <label class="ctl"><input type="checkbox" id="mirror" /> Mirror</label>
    <label class="ctl"><input type="checkbox" id="guides" checked /> Guide</label>

    <button class="btn" id="edit">Edit</button>
    <button class="btn" id="reset">Reset</button>
    <button class="btn primary" id="play">▶ Start</button>
    <button class="btn" id="full">⤢ Full</button>
  </div>

  <div class="stage" id="stage">
    <div class="track" id="track"><div class="script" id="script"></div></div>
    <div class="guide"></div>
    <div class="count" id="count">3</div>
  </div>

  <div class="editor" id="editor">
    <textarea id="ta" spellcheck="false" placeholder="Paste your script here…"></textarea>
    <div class="erow">
      <span class="hint">Space = play/pause · ↑↓ = speed · ←→ = nudge · R = reset · F = fullscreen · E = edit</span>
      <button class="btn" id="cancel">Cancel</button>
      <button class="btn primary" id="save">Save &amp; Close</button>
    </div>
  </div>

<script>
(function(){
  const DEFAULT = `I've spent twenty-three years building the layer underneath — trading systems, digital banks, and now AI platforms. Different industries, same problem every time: the data is fragmented, and the intelligence can't reach it.

I built market data and trading systems in capital markets. I built the mobile engineering team at Consorsbank — BNP Paribas Germany — and led product teams for Hello bank! across Paris, Belgium and Germany. As Chief Digital Officer at Geojit, I owned a platform serving over 1.3 million customers. Today I'm CTO at IndustryApps in Singapore.

For the last few years I've been building DataSpace — a context-first operating system for business — and CxtSpace, an agentic intelligence layer on top of it. The conviction behind both is simple: the model was never the bottleneck. Context was.

I'm looking for my next chapter — somewhere the problem is hard, the stakes are real, and the mandate is to build rather than maintain. If that's the room you're in, I'd like to talk.`;

  const $ = (id)=>document.getElementById(id);
  const stage=$("stage"), track=$("track"), script=$("script"), ta=$("ta");
  let y = 0, running = false, raf = null, lastT = 0;
  let st = { text:DEFAULT, speed:60, size:38, mirror:false, guides:true };

  // ---- persistence ----
  async function load(){
    try{
      const r = await window.storage.get("prompter");
      if(r && r.value) Object.assign(st, JSON.parse(r.value));
    }catch(e){ /* first run */ }
  }
  async function save(){
    try{ await window.storage.set("prompter", JSON.stringify(st)); }catch(e){}
  }

  function applyUI(){
    script.textContent = st.text;
    document.documentElement.style.setProperty("--size", st.size+"px");
    $("speed").value = st.speed; $("speedv").textContent = st.speed;
    $("size").value = st.size;   $("sizev").textContent = st.size;
    $("mirror").checked = st.mirror; document.body.classList.toggle("mirror", st.mirror);
    $("guides").checked = st.guides; document.body.classList.toggle("guides", st.guides);
    ta.value = st.text;
  }

  function maxScroll(){
    return Math.max(0, track.scrollHeight - stage.clientHeight*0.35);
  }
  function place(){ track.style.transform = `translateY(${-y}px)`; }

  function tick(t){
    if(!running) return;
    if(!lastT) lastT = t;
    const dt = (t - lastT)/1000; lastT = t;
    y += st.speed * dt;                 // speed = px per second
    if(y >= maxScroll()){ y = maxScroll(); place(); stop(); return; }
    place();
    raf = requestAnimationFrame(tick);
  }

  function start(){
    if(running) return;
    running = true; lastT = 0;
    document.body.classList.add("running");
    $("play").textContent = "❚❚ Pause";
    raf = requestAnimationFrame(tick);
  }
  function stop(){
    running = false;
    if(raf) cancelAnimationFrame(raf), raf=null;
    document.body.classList.remove("running");
    $("play").textContent = "▶ Start";
  }
  function toggle(){
    if(document.body.classList.contains("editing")) return;
    running ? stop() : countThenStart();
  }
  function reset(){ stop(); y=0; place(); }

  // 3-2-1 before it moves, so you can settle into frame
  function countThenStart(){
    if(y > 0){ start(); return; }     // resuming mid-script: no countdown
    let n = 3;
    const el = $("count");
    el.textContent = n;
    document.body.classList.add("counting");
    const iv = setInterval(()=>{
      n--;
      if(n === 0){
        clearInterval(iv);
        document.body.classList.remove("counting");
        start();
      } else el.textContent = n;
    }, 700);
  }

  // ---- controls ----
  $("play").addEventListener("click", toggle);
  $("reset").addEventListener("click", reset);
  $("speed").addEventListener("input", e=>{ st.speed=+e.target.value; $("speedv").textContent=st.speed; save(); });
  $("size").addEventListener("input", e=>{ st.size=+e.target.value; document.documentElement.style.setProperty("--size", st.size+"px"); $("sizev").textContent=st.size; save(); });
  $("mirror").addEventListener("change", e=>{ st.mirror=e.target.checked; document.body.classList.toggle("mirror", st.mirror); save(); });
  $("guides").addEventListener("change", e=>{ st.guides=e.target.checked; document.body.classList.toggle("guides", st.guides); save(); });

  $("edit").addEventListener("click", ()=>{ stop(); document.body.classList.add("editing"); ta.focus(); });
  $("cancel").addEventListener("click", ()=>{ ta.value = st.text; document.body.classList.remove("editing"); });
  $("save").addEventListener("click", ()=>{
    st.text = ta.value; script.textContent = st.text;
    document.body.classList.remove("editing");
    reset(); save();
  });

  $("full").addEventListener("click", ()=>{
    if(!document.fullscreenElement) document.documentElement.requestFullscreen?.();
    else document.exitFullscreen?.();
  });

  // click the stage to play/pause — handy when the mouse is out of reach
  stage.addEventListener("click", ()=>{ if(!document.body.classList.contains("editing")) toggle(); });

  // ---- keys ----
  document.addEventListener("keydown", (e)=>{
    if(document.body.classList.contains("editing")){
      if(e.key === "Escape"){ ta.value = st.text; document.body.classList.remove("editing"); }
      return;
    }
    switch(e.key){
      case " ": e.preventDefault(); toggle(); break;
      case "ArrowUp": e.preventDefault(); st.speed=Math.min(200, st.speed+5); applyUI(); save(); break;
      case "ArrowDown": e.preventDefault(); st.speed=Math.max(10, st.speed-5); applyUI(); save(); break;
      case "ArrowRight": e.preventDefault(); y=Math.min(maxScroll(), y+40); place(); break;
      case "ArrowLeft": e.preventDefault(); y=Math.max(0, y-40); place(); break;
      case "r": case "R": reset(); break;
      case "e": case "E": stop(); document.body.classList.add("editing"); ta.focus(); break;
      case "f": case "F":
        if(!document.fullscreenElement) document.documentElement.requestFullscreen?.();
        else document.exitFullscreen?.();
        break;
      case "Escape": stop(); break;
    }
  });

  window.addEventListener("resize", ()=>{ y=Math.min(y, maxScroll()); place(); });

  (async function init(){
    await load();
    applyUI();
    place();
  })();
})();
</script>
</body>
</html>

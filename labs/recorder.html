<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recorder</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
  background:#F5F2EE;
  font-family:'Space Mono',monospace;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:2rem 1rem;
}
.card{
  background:#fff;
  border-radius:16px;
  box-shadow:0 2px 24px rgba(0,0,0,0.07);
  padding:2.5rem 2rem;
  width:100%;
  max-width:340px;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:1.5rem;
}
.title{
  font-size:.65rem;
  letter-spacing:.3em;
  text-transform:uppercase;
  color:#aaa;
}
.btn-rec{
  width:88px;height:88px;
  border-radius:50%;
  background:#fff;
  border:2px solid #eee;
  box-shadow:0 3px 0 #ddd;
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all .1s;
}
.btn-rec:active{transform:translateY(2px);box-shadow:0 1px 0 #ddd;}
.btn-rec.on{background:#E84040;border-color:#C03030;box-shadow:0 3px 0 #a02020;}
.dot{
  width:28px;height:28px;border-radius:50%;
  background:#E84040;
  transition:all .1s;
}
.btn-rec.on .dot{background:#fff;border-radius:4px;width:20px;height:20px;}
.timer{
  font-size:2rem;letter-spacing:.08em;
  color:#222;
}
.timer.dim{color:#ccc;}
.controls{
  display:flex;gap:.75rem;width:100%;
}
.btn{
  flex:1;height:48px;
  border-radius:8px;
  border:1.5px solid #eee;
  background:#fff;
  font-family:'Space Mono',monospace;
  font-size:.65rem;letter-spacing:.1em;text-transform:uppercase;
  cursor:pointer;color:#555;
  transition:all .1s;
}
.btn:active{transform:translateY(1px);}
.btn:hover:not(:disabled){border-color:#bbb;color:#222;}
.btn:disabled{opacity:.3;cursor:default;}
.btn.play{background:#F96B2F;border-color:#E05020;color:#fff;}
.btn.play:hover:not(:disabled){background:#E05020;}
audio{width:100%;outline:none;display:none;}
audio.show{display:block;}
.status{
  font-size:.55rem;letter-spacing:.2em;text-transform:uppercase;
  color:#bbb;
  min-height:1em;
}
.status.rec{color:#E84040;}
.status.ready{color:#F96B2F;}
.credit{
  font-size:.48rem;letter-spacing:.1em;color:#ccc;text-transform:uppercase;
}
.credit a{color:#bbb;text-decoration:none;border-bottom:1px solid #eee;}
</style>
</head>
<body>
<div class="card">
  <span class="title">Recorder</span>

  <button class="btn-rec" id="btnRec" onclick="toggleRec()">
    <div class="dot"></div>
  </button>

  <div class="timer dim" id="timer">00:00</div>

  <span class="status" id="status">tap to record</span>

  <div class="controls">
    <button class="btn play" id="btnPlay" onclick="playRec()" disabled>▶ play</button>
    <button class="btn" id="btnSave" onclick="saveRec()" disabled>↓ save</button>
    <button class="btn" id="btnClear" onclick="clearRec()" disabled>✕</button>
  </div>

  <audio id="player" controls class=""></audio>

  <span class="credit">crafted with ♥ by <a href="mailto:mv.jayadev@gmail.com">Jayadev</a> · v20260515-1545</span>
</div>

<script>
let stream=null,recorder=null,chunks=[],blob=null;
let recording=false,secs=0,tick=null;

async function init(){
  if(stream)return true;
  try{
    stream=await navigator.mediaDevices.getUserMedia({audio:true,video:false});
    return true;
  }catch(e){
    setStatus('mic denied','');
    return false;
  }
}

async function toggleRec(){
  if(!recording){
    if(!await init())return;
    startRec();
  } else {
    stopRec();
  }
}

function startRec(){
  chunks=[];recording=true;secs=0;
  recorder=new MediaRecorder(stream);
  recorder.ondataavailable=e=>{ if(e.data.size>0)chunks.push(e.data); };
  recorder.onstop=onStop;
  recorder.start();
  document.getElementById('btnRec').classList.add('on');
  document.getElementById('timer').classList.remove('dim');
  setStatus('recording','rec');
  tick=setInterval(()=>{
    secs++;
    const m=String(Math.floor(secs/60)).padStart(2,'0');
    const s=String(secs%60).padStart(2,'0');
    document.getElementById('timer').textContent=m+':'+s;
  },1000);
}

function stopRec(){
  recording=false;
  recorder.stop();
  clearInterval(tick);
  document.getElementById('btnRec').classList.remove('on');
  setStatus('processing…','');
}

function onStop(){
  blob=new Blob(chunks,{type:chunks[0]?.type||'audio/webm'});
  const url=URL.createObjectURL(blob);
  const player=document.getElementById('player');
  player.src=url;
  player.classList.add('show');
  setStatus('ready','ready');
  document.getElementById('btnPlay').disabled=false;
  document.getElementById('btnSave').disabled=false;
  document.getElementById('btnClear').disabled=false;
}

function playRec(){
  const p=document.getElementById('player');
  if(p.paused){p.play();document.getElementById('btnPlay').textContent='■ stop';}
  else{p.pause();p.currentTime=0;document.getElementById('btnPlay').textContent='▶ play';}
}

function saveRec(){
  if(!blob)return;
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='recording.webm';
  a.click();
}

function clearRec(){
  blob=null;chunks=[];secs=0;recording=false;
  const player=document.getElementById('player');
  player.src='';player.classList.remove('show');
  document.getElementById('timer').textContent='00:00';
  document.getElementById('timer').classList.add('dim');
  document.getElementById('btnPlay').disabled=true;
  document.getElementById('btnPlay').textContent='▶ play';
  document.getElementById('btnSave').disabled=true;
  document.getElementById('btnClear').disabled=true;
  setStatus('tap to record','');
}

function setStatus(txt,cls){
  const el=document.getElementById('status');
  el.textContent=txt;
  el.className='status'+(cls?' '+cls:'');
}

document.getElementById('player').onended=()=>{
  document.getElementById('btnPlay').textContent='▶ play';
};
</script>
</body>
</html>

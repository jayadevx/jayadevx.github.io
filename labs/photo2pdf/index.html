<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Photo Print Layout — A4</title>
<meta name="description" content="Turns a batch of photos into a print-ready A4 PDF layout. Point, shoot, print.">
<link rel="canonical" href="https://singularityblue.com/labs/photo2pdf/">
<meta property="og:type" content="website">
<meta property="og:title" content="Photo2PDF — Photo Print Layout A4">
<meta property="og:description" content="Turns a batch of photos into a print-ready A4 PDF layout. Point, shoot, print.">
<meta property="og:url" content="https://singularityblue.com/labs/photo2pdf/">
<meta name="twitter:card" content="summary">
<meta name="twitter:title" content="Photo2PDF — Photo Print Layout A4">
<meta name="twitter:description" content="Turns a batch of photos into a print-ready A4 PDF layout. Point, shoot, print.">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  :root {
    --ink: #0f0f0f;
    --paper: #f7f5f0;
    --accent: #1a6b4a;
    --accent-light: #e8f4ef;
    --muted: #888;
    --border: #d8d4cc;
    --danger: #c0392b;
    --white: #ffffff;
    --radius: 6px;
    --mono: 'Courier New', monospace;
    --sans: system-ui, -apple-system, sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--sans);
    background: var(--paper);
    color: var(--ink);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── HEADER ── */
  header {
    background: var(--ink);
    color: var(--white);
    padding: 18px 32px;
    display: flex;
    align-items: baseline;
    gap: 12px;
  }
  header h1 {
    font-size: 1.1rem;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  header span {
    font-family: var(--mono);
    font-size: 0.72rem;
    color: #aaa;
    letter-spacing: 0.04em;
  }

  /* ── MAIN LAYOUT ── */
  .shell {
    display: flex;
    flex: 1;
    gap: 0;
  }

  /* ── LEFT PANEL ── */
  .panel {
    width: 280px;
    min-width: 260px;
    background: var(--white);
    border-right: 1px solid var(--border);
    padding: 24px 20px;
    display: flex;
    flex-direction: column;
    gap: 24px;
  }

  .panel-section h2 {
    font-size: 0.65rem;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
  }

  /* Drop zone */
  .dropzone {
    border: 2px dashed var(--border);
    border-radius: var(--radius);
    padding: 28px 16px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
    background: var(--paper);
  }
  .dropzone:hover, .dropzone.drag-over {
    border-color: var(--accent);
    background: var(--accent-light);
  }
  .dropzone svg { margin-bottom: 8px; }
  .dropzone p {
    font-size: 0.78rem;
    color: var(--muted);
    line-height: 1.5;
  }
  .dropzone strong { color: var(--accent); }
  #fileInput { display: none; }

  /* Layout selector */
  .layout-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  .layout-btn {
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    padding: 8px 6px 6px;
    cursor: pointer;
    background: var(--white);
    text-align: center;
    transition: border-color 0.12s, background 0.12s;
  }
  .layout-btn:hover { border-color: var(--accent); background: var(--accent-light); }
  .layout-btn.active { border-color: var(--accent); background: var(--accent-light); }
  .layout-btn .icon {
    display: grid;
    gap: 2px;
    margin: 0 auto 5px;
    width: 38px;
    height: 38px;
    padding: 4px;
    background: var(--paper);
    border-radius: 3px;
  }
  .layout-btn .icon .cell {
    background: var(--border);
    border-radius: 1px;
  }
  .layout-btn .active .icon .cell { background: var(--accent); }
  .layout-btn p { font-size: 0.68rem; font-weight: 600; color: var(--ink); }
  .layout-btn small { font-size: 0.6rem; color: var(--muted); }

  /* Options */
  .option-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 0.78rem;
    padding: 4px 0;
  }
  .option-row label { color: var(--ink); }
  .option-row select, .option-row input[type=range] {
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 3px 6px;
    font-size: 0.75rem;
    background: var(--paper);
    color: var(--ink);
    cursor: pointer;
  }

  /* Thumbnail strip */
  .thumb-strip {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .thumb {
    width: 56px;
    height: 56px;
    border-radius: 4px;
    object-fit: cover;
    border: 1.5px solid var(--border);
    cursor: pointer;
    position: relative;
    transition: border-color 0.12s;
  }
  .thumb-wrap {
    position: relative;
    display: inline-block;
  }
  .thumb-wrap .remove-btn {
    position: absolute;
    top: -5px; right: -5px;
    width: 16px; height: 16px;
    background: var(--danger);
    color: white;
    border: none; border-radius: 50%;
    font-size: 9px; line-height: 16px;
    text-align: center; cursor: pointer;
    display: none;
  }
  .thumb-wrap:hover .remove-btn { display: block; }

  .thumb-empty {
    font-size: 0.72rem;
    color: var(--muted);
    font-style: italic;
  }

  /* Stats */
  .stat-row {
    display: flex;
    justify-content: space-between;
    font-size: 0.72rem;
    color: var(--muted);
    padding: 2px 0;
    border-bottom: 1px dotted var(--border);
  }
  .stat-row strong { color: var(--ink); font-weight: 600; }

  /* Buttons */
  .btn {
    display: block;
    width: 100%;
    padding: 11px;
    border: none;
    border-radius: var(--radius);
    font-size: 0.8rem;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    cursor: pointer;
    transition: opacity 0.12s, transform 0.08s;
  }
  .btn:active { transform: scale(0.98); }
  .btn-primary {
    background: var(--accent);
    color: white;
  }
  .btn-primary:hover { opacity: 0.88; }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-ghost {
    background: transparent;
    border: 1.5px solid var(--border);
    color: var(--muted);
  }
  .btn-ghost:hover { border-color: var(--danger); color: var(--danger); }

  /* ── RIGHT: PREVIEW ── */
  .preview-area {
    flex: 1;
    padding: 28px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 24px;
    align-items: center;
  }

  .preview-header {
    width: 100%;
    max-width: 820px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .preview-header h2 {
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
  }
  .page-count {
    font-family: var(--mono);
    font-size: 0.7rem;
    color: var(--muted);
  }

  /* A4 page preview — 210×297mm at 96dpi = 794×1123px, scaled to fit */
  .a4-page {
    background: white;
    box-shadow: 0 2px 18px rgba(0,0,0,0.13);
    width: 595px; /* ~A4 width in pts */
    height: 842px;
    position: relative;
    overflow: hidden;
    flex-shrink: 0;
    border-radius: 2px;
  }
  .a4-page .page-label {
    position: absolute;
    bottom: 6px;
    right: 10px;
    font-family: var(--mono);
    font-size: 8px;
    color: #ccc;
  }

  /* Photo cells inside A4 */
  .photo-grid {
    width: 100%;
    height: 100%;
    display: grid;
    padding: 16px;
    gap: 8px;
  }
  .photo-cell {
    overflow: hidden;
    background: #f0f0f0;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 2px;
  }
  .photo-cell img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  .photo-cell.empty {
    background: #f5f5f5;
    border: 1px dashed #ddd;
  }

  /* Empty state */
  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    margin: auto;
    padding: 40px;
    text-align: center;
  }
  .empty-state svg { opacity: 0.18; }
  .empty-state h3 { font-size: 1rem; color: var(--muted); }
  .empty-state p { font-size: 0.78rem; color: var(--muted); }

  /* Progress bar */
  .progress-bar {
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-bar .fill {
    height: 100%;
    background: var(--accent);
    transition: width 0.3s;
  }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 24px; right: 24px;
    background: var(--ink);
    color: white;
    padding: 10px 18px;
    border-radius: var(--radius);
    font-size: 0.78rem;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
    z-index: 999;
  }
  .toast.show { opacity: 1; }

  /* Spinner */
  .spinner {
    display: none;
    width: 16px; height: 16px;
    border: 2px solid rgba(255,255,255,0.4);
    border-top-color: white;
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    margin: 0 auto;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Responsive tweaks */
  @media (max-width: 860px) {
    .shell { flex-direction: column; }
    .panel { width: 100%; min-width: unset; border-right: none; border-bottom: 1px solid var(--border); }
    .a4-page { width: 400px; height: 566px; }
  }
</style>
</head>
<body>

<header>
  <h1>Photo Print Layout</h1>
  <span>A4 · PDF</span>
</header>

<div class="shell">
  <!-- LEFT PANEL -->
  <aside class="panel">

    <!-- Upload -->
    <div class="panel-section">
      <h2>Photos</h2>
      <div class="dropzone" id="dropzone">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#aaa" stroke-width="1.5">
          <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/>
          <polyline points="21 15 16 10 5 21"/>
        </svg>
        <p>Drop photos here or<br><strong>click to browse</strong></p>
      </div>
      <input type="file" id="fileInput" accept="image/*" multiple>
    </div>

    <!-- Layout -->
    <div class="panel-section">
      <h2>Layout — photos per page</h2>
      <div class="layout-grid" id="layoutGrid">
        <!-- filled by JS -->
      </div>
    </div>

    <!-- Options -->
    <div class="panel-section">
      <h2>Options</h2>
      <div class="option-row">
        <label>Orientation</label>
        <select id="orientSelect">
          <option value="portrait">Portrait</option>
          <option value="landscape">Landscape</option>
        </select>
      </div>
      <div class="option-row">
        <label>Fit</label>
        <select id="fitSelect">
          <option value="cover">Fill cell (crop)</option>
          <option value="contain">Fit inside cell</option>
        </select>
      </div>
      <div class="option-row">
        <label>Gap</label>
        <select id="gapSelect">
          <option value="4">Tight (4px)</option>
          <option value="8" selected>Normal (8px)</option>
          <option value="16">Airy (16px)</option>
          <option value="0">None</option>
        </select>
      </div>
    </div>

    <!-- Stats -->
    <div class="panel-section">
      <h2>Summary</h2>
      <div id="statsBox">
        <div class="stat-row"><span>Photos</span><strong id="statPhotos">0</strong></div>
        <div class="stat-row"><span>Per page</span><strong id="statPerPage">—</strong></div>
        <div class="stat-row"><span>Pages</span><strong id="statPages">—</strong></div>
      </div>
    </div>

    <!-- Thumbnails -->
    <div class="panel-section" style="flex:1; overflow-y:auto;">
      <h2>Added Photos</h2>
      <div class="thumb-strip" id="thumbStrip">
        <span class="thumb-empty">No photos yet</span>
      </div>
    </div>

    <!-- Actions -->
    <div style="display:flex; flex-direction:column; gap:8px;">
      <button class="btn btn-primary" id="downloadBtn" disabled>
        <span id="btnLabel">Download PDF</span>
        <div class="spinner" id="spinner"></div>
      </button>
      <button class="btn btn-ghost" id="clearBtn">Clear All</button>
    </div>

  </aside>

  <!-- RIGHT: PREVIEW -->
  <main class="preview-area" id="previewArea">
    <div class="empty-state" id="emptyState">
      <svg width="72" height="72" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">
        <rect x="3" y="3" width="18" height="18" rx="2"/>
        <circle cx="8.5" cy="8.5" r="1.5"/>
        <polyline points="21 15 16 10 5 21"/>
      </svg>
      <h3>No photos added yet</h3>
      <p>Upload photos from the left panel<br>to see your A4 print preview here.</p>
    </div>
  </main>
</div>

<div class="toast" id="toast"></div>

<script>
// ── State ──
const state = {
  images: [],       // { dataUrl, name }
  layout: 1,        // photos per page
  orientation: 'portrait',
  fit: 'cover',
  gap: 8
};

// ── Layout configs: [cols, rows] per layout option ──
const LAYOUTS = {
  1:  { cols: 1, rows: 1,  label: '1 Photo',   sub: 'Full page' },
  2:  { cols: 1, rows: 2,  label: '2 Photos',  sub: '1 × 2' },
  4:  { cols: 2, rows: 2,  label: '4 Photos',  sub: '2 × 2' },
  6:  { cols: 2, rows: 3,  label: '6 Photos',  sub: '2 × 3' },
  8:  { cols: 2, rows: 4,  label: '8 Photos',  sub: '2 × 4' },
  9:  { cols: 3, rows: 3,  label: '9 Photos',  sub: '3 × 3' },
  12: { cols: 3, rows: 4,  label: '12 Photos', sub: '3 × 4' },
  15: { cols: 3, rows: 5,  label: '15 Photos', sub: '3 × 5' },
};

// ── DOM refs ──
const dropzone    = document.getElementById('dropzone');
const fileInput   = document.getElementById('fileInput');
const layoutGrid  = document.getElementById('layoutGrid');
const orientSelect= document.getElementById('orientSelect');
const fitSelect   = document.getElementById('fitSelect');
const gapSelect   = document.getElementById('gapSelect');
const previewArea = document.getElementById('previewArea');
const emptyState  = document.getElementById('emptyState');
const thumbStrip  = document.getElementById('thumbStrip');
const downloadBtn = document.getElementById('downloadBtn');
const clearBtn    = document.getElementById('clearBtn');
const spinner     = document.getElementById('spinner');
const btnLabel    = document.getElementById('btnLabel');
const statPhotos  = document.getElementById('statPhotos');
const statPerPage = document.getElementById('statPerPage');
const statPages   = document.getElementById('statPages');
const toast       = document.getElementById('toast');

// ── Build layout buttons ──
function buildLayoutGrid() {
  layoutGrid.innerHTML = '';
  Object.entries(LAYOUTS).forEach(([n, cfg]) => {
    const btn = document.createElement('button');
    btn.className = 'layout-btn' + (state.layout == n ? ' active' : '');
    btn.dataset.n = n;

    // Mini icon grid
    const icon = document.createElement('div');
    icon.className = 'icon';
    icon.style.gridTemplateColumns = `repeat(${cfg.cols}, 1fr)`;
    icon.style.gridTemplateRows    = `repeat(${cfg.rows}, 1fr)`;
    for (let i = 0; i < cfg.cols * cfg.rows; i++) {
      const cell = document.createElement('div');
      cell.className = 'cell';
      icon.appendChild(cell);
    }

    btn.innerHTML = `<p>${cfg.label}</p><small>${cfg.sub}</small>`;
    btn.insertBefore(icon, btn.firstChild);

    btn.addEventListener('click', () => {
      state.layout = parseInt(n);
      buildLayoutGrid();
      render();
    });
    layoutGrid.appendChild(btn);
  });
}

// ── File handling ──
dropzone.addEventListener('click', () => fileInput.click());
dropzone.addEventListener('dragover', e => { e.preventDefault(); dropzone.classList.add('drag-over'); });
dropzone.addEventListener('dragleave', () => dropzone.classList.remove('drag-over'));
dropzone.addEventListener('drop', e => {
  e.preventDefault();
  dropzone.classList.remove('drag-over');
  handleFiles([...e.dataTransfer.files]);
});
fileInput.addEventListener('change', () => handleFiles([...fileInput.files]));

function handleFiles(files) {
  const imageFiles = files.filter(f => f.type.startsWith('image/'));
  if (!imageFiles.length) { showToast('No image files found'); return; }

  let loaded = 0;
  imageFiles.forEach(file => {
    const reader = new FileReader();
    reader.onload = e => {
      state.images.push({ dataUrl: e.target.result, name: file.name });
      loaded++;
      if (loaded === imageFiles.length) {
        render();
        showToast(`${loaded} photo${loaded > 1 ? 's' : ''} added`);
      }
    };
    reader.readAsDataURL(file);
  });
  fileInput.value = '';
}

// ── Options ──
orientSelect.addEventListener('change', e => { state.orientation = e.target.value; render(); });
fitSelect.addEventListener('change',    e => { state.fit = e.target.value; render(); });
gapSelect.addEventListener('change',    e => { state.gap = parseInt(e.target.value); render(); });

// ── Clear ──
clearBtn.addEventListener('click', () => {
  if (!state.images.length) return;
  state.images = [];
  render();
  showToast('All photos cleared');
});

// ── Render preview ──
function render() {
  buildStats();
  renderThumbs();

  // Remove old pages
  previewArea.querySelectorAll('.a4-page, .preview-header').forEach(el => el.remove());

  if (!state.images.length) {
    emptyState.style.display = 'flex';
    downloadBtn.disabled = true;
    return;
  }
  emptyState.style.display = 'none';
  downloadBtn.disabled = false;

  const perPage = state.layout;
  const cfg     = LAYOUTS[perPage];
  const pages   = Math.ceil(state.images.length / perPage);

  // A4 dimensions in preview px
  const isLandscape = state.orientation === 'landscape';
  const W = isLandscape ? 842 : 595;
  const H = isLandscape ? 595 : 842;

  // Header
  const header = document.createElement('div');
  header.className = 'preview-header';
  header.innerHTML = `
    <h2>Print Preview · A4 ${state.orientation}</h2>
    <span class="page-count">${pages} page${pages > 1 ? 's' : ''} · ${state.images.length} photo${state.images.length > 1 ? 's' : ''}</span>
  `;
  previewArea.appendChild(header);

  for (let p = 0; p < pages; p++) {
    const pageEl = document.createElement('div');
    pageEl.className = 'a4-page';
    pageEl.style.width  = W + 'px';
    pageEl.style.height = H + 'px';

    // Adjust grid for landscape: swap rows/cols
    const cols = isLandscape ? cfg.rows : cfg.cols;
    const rows = isLandscape ? cfg.cols : cfg.rows;

    const grid = document.createElement('div');
    grid.className = 'photo-grid';
    grid.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
    grid.style.gridTemplateRows    = `repeat(${rows}, 1fr)`;
    grid.style.gap   = state.gap + 'px';
    grid.style.padding = '12px';

    const start = p * perPage;
    for (let i = 0; i < perPage; i++) {
      const cell = document.createElement('div');
      cell.className = 'photo-cell';

      const imgData = state.images[start + i];
      if (imgData) {
        const img = document.createElement('img');
        img.src = imgData.dataUrl;
        img.style.objectFit = state.fit;
        cell.appendChild(img);
      } else {
        cell.classList.add('empty');
      }
      grid.appendChild(cell);
    }

    pageEl.appendChild(grid);
    pageEl.innerHTML += `<div class="page-label">Page ${p + 1} / ${pages} · v20260622-1100</div>`;
    previewArea.appendChild(pageEl);
  }
}

// ── Thumbnails ──
function renderThumbs() {
  thumbStrip.innerHTML = '';
  if (!state.images.length) {
    thumbStrip.innerHTML = '<span class="thumb-empty">No photos yet</span>';
    return;
  }
  state.images.forEach((img, idx) => {
    const wrap = document.createElement('div');
    wrap.className = 'thumb-wrap';

    const el = document.createElement('img');
    el.className = 'thumb';
    el.src = img.dataUrl;
    el.title = img.name;

    const rm = document.createElement('button');
    rm.className = 'remove-btn';
    rm.textContent = '×';
    rm.title = 'Remove';
    rm.addEventListener('click', () => {
      state.images.splice(idx, 1);
      render();
    });

    wrap.appendChild(el);
    wrap.appendChild(rm);
    thumbStrip.appendChild(wrap);
  });
}

// ── Stats ──
function buildStats() {
  const n     = state.images.length;
  const pp    = state.layout;
  const pages = n ? Math.ceil(n / pp) : '—';
  statPhotos.textContent  = n;
  statPerPage.textContent = pp;
  statPages.textContent   = pages;
}

// ── PDF Download ──
downloadBtn.addEventListener('click', generatePDF);

async function generatePDF() {
  if (!state.images.length) return;

  downloadBtn.disabled = true;
  btnLabel.style.display = 'none';
  spinner.style.display  = 'block';

  try {
    const { jsPDF } = window.jspdf;
    const isLandscape = state.orientation === 'landscape';

    // A4 in mm
    const doc = new jsPDF({
      orientation: isLandscape ? 'landscape' : 'portrait',
      unit: 'mm',
      format: 'a4'
    });

    const pageW  = isLandscape ? 297 : 210;
    const pageH  = isLandscape ? 210 : 297;
    const margin = 8;
    const cfg    = LAYOUTS[state.layout];
    const cols   = isLandscape ? cfg.rows : cfg.cols;
    const rows   = isLandscape ? cfg.cols : cfg.rows;
    const gap    = state.gap / 3.779; // px → mm (approx at 96dpi)
    const perPage = state.layout;
    const pages   = Math.ceil(state.images.length / perPage);

    const cellW = (pageW - margin * 2 - gap * (cols - 1)) / cols;
    const cellH = (pageH - margin * 2 - gap * (rows - 1)) / rows;

    for (let p = 0; p < pages; p++) {
      if (p > 0) doc.addPage();

      const start = p * perPage;
      for (let i = 0; i < perPage; i++) {
        const imgData = state.images[start + i];
        if (!imgData) continue;

        const col = i % cols;
        const row = Math.floor(i / cols);
        const x   = margin + col * (cellW + gap);
        const y   = margin + row * (cellH + gap);

        // Detect format
        const fmt = imgData.dataUrl.includes('image/png') ? 'PNG' :
                    imgData.dataUrl.includes('image/webp') ? 'WEBP' : 'JPEG';

        if (state.fit === 'cover') {
          // Crop to fill cell: draw image then clip
          await drawCoverImage(doc, imgData.dataUrl, fmt, x, y, cellW, cellH);
        } else {
          // Fit inside cell
          await drawContainImage(doc, imgData.dataUrl, fmt, x, y, cellW, cellH);
        }
      }
    }

    const filename = `photo-layout-a4-${state.layout}up-v20260622-1100.pdf`;
    doc.save(filename);
    showToast('PDF saved!');
  } catch (err) {
    console.error(err);
    showToast('Error generating PDF — see console');
  } finally {
    downloadBtn.disabled = false;
    btnLabel.style.display = 'block';
    spinner.style.display  = 'none';
  }
}

// Draw image covering entire cell (crops to fill)
async function drawCoverImage(doc, dataUrl, fmt, x, y, cellW, cellH) {
  const dims = await getImageDimensions(dataUrl);
  const imgAspect  = dims.w / dims.h;
  const cellAspect = cellW / cellH;

  let srcX = 0, srcY = 0, srcW = dims.w, srcH = dims.h;

  if (imgAspect > cellAspect) {
    // Image wider — crop sides
    srcW = dims.h * cellAspect;
    srcX = (dims.w - srcW) / 2;
  } else {
    // Image taller — crop top/bottom
    srcH = dims.w / cellAspect;
    srcY = (dims.h - srcH) / 2;
  }

  // Crop via canvas
  const canvas = document.createElement('canvas');
  const scale  = Math.min(1200 / srcW, 1200 / srcH, 1);
  canvas.width  = Math.round(srcW * scale);
  canvas.height = Math.round(srcH * scale);
  const ctx = canvas.getContext('2d');

  const img = await loadImage(dataUrl);
  ctx.drawImage(img, srcX, srcY, srcW, srcH, 0, 0, canvas.width, canvas.height);

  const cropped = canvas.toDataURL('image/jpeg', 0.92);
  doc.addImage(cropped, 'JPEG', x, y, cellW, cellH);
}

// Draw image fitting inside cell (letterboxed)
async function drawContainImage(doc, dataUrl, fmt, x, y, cellW, cellH) {
  const dims = await getImageDimensions(dataUrl);
  const imgAspect  = dims.w / dims.h;
  const cellAspect = cellW / cellH;

  let drawW, drawH, drawX, drawY;
  if (imgAspect > cellAspect) {
    drawW = cellW;
    drawH = cellW / imgAspect;
    drawX = x;
    drawY = y + (cellH - drawH) / 2;
  } else {
    drawH = cellH;
    drawW = cellH * imgAspect;
    drawX = x + (cellW - drawW) / 2;
    drawY = y;
  }
  doc.addImage(dataUrl, fmt, drawX, drawY, drawW, drawH);
}

function loadImage(src) {
  return new Promise((res, rej) => {
    const img = new Image();
    img.onload = () => res(img);
    img.onerror = rej;
    img.src = src;
  });
}

function getImageDimensions(src) {
  return new Promise(res => {
    const img = new Image();
    img.onload = () => res({ w: img.naturalWidth, h: img.naturalHeight });
    img.src = src;
  });
}

// ── Toast ──
let toastTimer;
function showToast(msg) {
  toast.textContent = msg;
  toast.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toast.classList.remove('show'), 2400);
}

// ── Init ──
buildLayoutGrid();
render();
</script>
